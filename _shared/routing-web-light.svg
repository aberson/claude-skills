<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 964 576" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,'Roboto Mono',monospace" role="img" aria-label="The routing web: operator vent through user-gateway to eight rails, with the plan rail forking to plan-feature (existing project) and plan-init (new project)">
  <defs>
    <marker id="ar-light" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#C0C9DA"/></marker>
    <filter id="sh-light" x="-20%" y="-40%" width="140%" height="180%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(20,26,40,.16)"/></filter>
  </defs>
  <style>
    .bg{fill:#FFFFFF;stroke:#D4DBE8;stroke-width:1.5}
    .fan{fill:none;stroke:#C0C9DA;stroke-width:1.7}
    .fork{fill:none;stroke:#3355E0;stroke-width:1.7}
    .rail rect{fill:#FFFFFF;stroke:#C0C9DA;stroke-width:1.4;filter:url(#sh-light)}
    .rail-name{fill:#3355E0;font-size:16px;font-weight:600}
    .rail-dest{fill:#6E778C;font-size:11.5px}
    .rail-sub{fill:#B6771F;font-size:11.5px}
    .innode rect{fill:#FFFFFF;stroke:#C0C9DA;stroke-width:1.4;filter:url(#sh-light)}
    .innode.gw rect{stroke:#3355E0;stroke-width:1.7}
    .in-t{fill:#454E62;font-size:13px}
    .gw-cmd{fill:#3355E0;font-size:15px;font-weight:600}
    .gw-sub{fill:#6E778C;font-size:10.5px}
    .hub-t{fill:#171B24;font-size:14px;font-weight:600}
    .hub-sub{fill:#6E778C;font-size:10.5px}
    .chip rect{fill:#E4E9FB;stroke:#3355E0;stroke-width:1.2}
    .chip-cmd{fill:#3355E0;font-size:12px;font-weight:600}
    .chip-lbl{fill:#6E778C;font-size:9.5px}
    .title{fill:#6E778C;font-size:11px;letter-spacing:.12em}
  </style>
  <rect class="bg" x="6" y="6" width="952" height="564" rx="16"/>
  <text class="title" x="28" y="40">THE ROUTING WEB  ·  ONE VENT  →  8 RAILS</text>
  <g>
    <path class="fan" marker-end="url(#ar-light)" d="M212,286 C 340,286 352,62 470,62"/>
    <path class="fan" marker-end="url(#ar-light)" d="M212,286 C 340,286 352,126 470,126"/>
    <path class="fan" marker-end="url(#ar-light)" d="M212,286 C 340,286 352,190 470,190"/>
    <path class="fan" marker-end="url(#ar-light)" d="M212,286 C 340,286 352,254 470,254"/>
    <path class="fan" marker-end="url(#ar-light)" d="M212,286 C 340,286 352,318 470,318"/>
    <path class="fan" marker-end="url(#ar-light)" d="M212,286 C 340,286 352,382 470,382"/>
    <path class="fan" marker-end="url(#ar-light)" d="M212,286 C 340,286 352,446 470,446"/>
    <path class="fan" marker-end="url(#ar-light)" d="M212,286 C 340,286 352,510 470,510"/>
  </g>
  <path class="fork" d="M800,190 C 804,190 802,175 808,175"/><path class="fork" d="M800,190 C 804,190 802,213 808,213"/>
  
    <g class="innode vent"><rect x="28" y="110" width="152" height="38" rx="10"/>
      <text class="in-t" x="44" y="134">operator vent</text></g>
    <path class="fan" marker-end="url(#ar-light)" d="M104,148 L104,168"/>
    <g class="innode gw"><rect x="28" y="168" width="200" height="60" rx="12"/>
      <text class="gw-cmd" x="44" y="194">/user-gateway</text>
      <text class="gw-sub" x="44" y="212">one routed row per fragment</text></g>
    <path class="fan" marker-end="url(#ar-light)" d="M128,228 L128,258"/>
    <g class="innode hub"><rect x="44" y="258" width="168" height="56" rx="12"/>
      <text class="hub-t" x="60" y="282">routing web</text>
      <text class="hub-sub" x="60" y="300">skill-pipeline.md</text></g>
  <g>
    <g class="rail"><rect x="470" y="36" width="330" height="52" rx="11"/><text class="rail-name" x="488" y="58">bug</text><text class="rail-dest" x="488" y="76">/user-debug</text></g>
    <g class="rail"><rect x="470" y="100" width="330" height="52" rx="11"/><text class="rail-name" x="488" y="122">do</text><text class="rail-dest" x="488" y="140">/goblin-do</text></g>
    <g class="rail"><rect x="470" y="164" width="330" height="52" rx="11"/><text class="rail-name" x="488" y="186">plan</text><text class="rail-sub" x="488" y="204">forks by project age →</text></g>
    <g class="rail"><rect x="470" y="228" width="330" height="52" rx="11"/><text class="rail-name" x="488" y="250">investigate</text><text class="rail-dest" x="488" y="268">/deep-research  ·  Explore</text></g>
    <g class="rail"><rect x="470" y="292" width="330" height="52" rx="11"/><text class="rail-name" x="488" y="314">verify</text><text class="rail-dest" x="488" y="332">/user-uat  ·  /user-shakedown</text></g>
    <g class="rail"><rect x="470" y="356" width="330" height="52" rx="11"/><text class="rail-name" x="488" y="378">trim</text><text class="rail-dest" x="488" y="396">/plan-trim</text></g>
    <g class="rail"><rect x="470" y="420" width="330" height="52" rx="11"/><text class="rail-name" x="488" y="442">decide</text><text class="rail-dest" x="488" y="460">surfaced  ·  parked for you</text></g>
    <g class="rail"><rect x="470" y="484" width="330" height="52" rx="11"/><text class="rail-name" x="488" y="506">draft</text><text class="rail-dest" x="488" y="524">/user-draft  →  /goal</text></g>
  </g>
  <g class="chip"><rect x="808" y="158" width="140" height="34" rx="8"/><text class="chip-cmd" x="820" y="173">/plan-feature</text><text class="chip-lbl" x="820" y="185">existing project</text></g><g class="chip"><rect x="808" y="196" width="140" height="34" rx="8"/><text class="chip-cmd" x="820" y="211">/plan-init</text><text class="chip-lbl" x="820" y="223">brand-new project</text></g>
</svg>
